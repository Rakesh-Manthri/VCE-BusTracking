<!DOCTYPE html>
<html>
<head>
    <title>Navigation Project</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />

    <style>
        #map { height: 600px; width: 100%; }
    </style>
</head>
<body>
<h1>Navigation between Coordinates</h1>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script>
    var coord1 = [17.385289, 78.364663];
    var coord2 = [17.380301, 78.382816];

    var map = L.map('map').setView(coord1, 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {

    }).addTo(map);

    L.Routing.control({
        waypoints: [
            L.latLng(coord1[0], coord1[1]),
            L.latLng(coord2[0], coord2[1])
        ],
        // Key properties to disable interactivity:
        draggableWaypoints: false,
        addWaypoints: false,
        routeWhileDragging: false
    }).addTo(map);
</script>
</body>
</html>
