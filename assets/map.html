<!DOCTYPE html>
<html>
<head>
    <title>Navigation Project</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />

    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
    </style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script>
    // Debug log to confirm the latest version of the file is loaded
    console.log("Map loaded: updateBusRoute is ready");

    // Default view (Hyderabad)
    var map = L.map('map').setView([17.3850, 78.4867], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {}).addTo(map);

    var userMarker;
    var routingControl;

    // Define a custom icon for the bus
    var busIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png', // Public bus icon asset
        iconSize: [40, 40],
        iconAnchor: [20, 40],
        popupAnchor: [0, -40]
    });

    // Function to update the route dynamically from Flutter
    function updateBusRoute(userLat, userLng, busLat, busLng) {
        if (routingControl) {
            map.removeControl(routingControl);
        }

        routingControl = L.Routing.control({
            waypoints: [
                L.latLng(userLat, userLng),
                L.latLng(busLat, busLng)
            ],
            lineOptions: { styles: [{ color: 'blue', weight: 6 }] },
            addWaypoints: false,
            draggableWaypoints: false,
            routeWhileDragging: false,
            show: false, // Hide text instructions for a cleaner UI
            createMarker: function(i, wp, nWps) {
                if (i === nWps - 1) {
                    // This is the Destination (The Bus)
                    return L.marker(wp.latLng, {icon: busIcon}).bindPopup("Bus Location");
                } else {
                    // This is the Start (The User) - use default marker
                    return L.marker(wp.latLng).bindPopup("You");
                }
            }
        }).addTo(map);
    }

    // Function called from Flutter to update the map view
    function centerMap(lat, lng) {
        // Remove existing marker if it exists
        if (userMarker) {
            map.removeLayer(userMarker);
        }
        map.setView([lat, lng], 16);
        userMarker = L.marker([lat, lng]).addTo(map).bindPopup("You are here").openPopup();
    }
</script>
</body>
</html>
