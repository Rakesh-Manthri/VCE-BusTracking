name: VCE_Busses

description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # PHASE 3: Added the webview plugin here
  webview_flutter: ^4.10.0
  geolocator: ^13.0.2
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  # PRODUCTION UPGRADE: Driver session persistence
  shared_preferences: ^2.3.4
  # PRODUCTION UPGRADE: Local notifications for stop alerts
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images.png"
  adaptive_icon_background: "#ffffff"

  min_sdk_android: 21


flutter:
  uses-material-design: true

  # PHASE 3: Registered your map file here
  # Ensure your folder is named 'assets' and the file is 'map.html'
  assets:
    - assets/map.html